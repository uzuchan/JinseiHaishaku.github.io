<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生拝借 — a life borrowed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #13110f;
  --bg-soft: #1c1916;
  --bg-card: #1a1714;
  --ink: #ece3cc;
  --ink-dim: #a89a82;
  --ink-faint: #6b6356;
  --accent: #c9a961;
  --accent-deep: #8c6f3a;
  --crimson: #a8412e;
  --rule: rgba(236, 227, 204, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Shippori Mincho', 'Yu Mincho', '游明朝', serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* paper grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/%3E%3CfeColorMatrix values='0 0 0 0 0.9 0 0 0 0 0.85 0 0 0 0 0.75 0 0 0 0.5 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/%3E%3C/svg%3E");
  opacity: 0.07;
  pointer-events: none;
  z-index: 1000;
  mix-blend-mode: overlay;
}

/* soft vignette */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.4) 100%);
  pointer-events: none;
  z-index: 999;
}

.app {
  max-width: 680px;
  margin: 0 auto;
  padding: 4rem 2rem 6rem;
  position: relative;
  z-index: 1;
}

/* ====== TITLE SCREEN ====== */
.title-screen {
  min-height: 85vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 2.5rem;
  animation: slowFade 1.6s ease forwards;
}

.title-mark {
  font-size: clamp(3rem, 9vw, 5.5rem);
  font-weight: 600;
  letter-spacing: 0.35em;
  color: var(--ink);
  position: relative;
  padding-right: 0.35em;
  line-height: 1;
}

.title-mark::after {
  content: '';
  position: absolute;
  bottom: -1.2rem;
  left: 50%;
  transform: translateX(-50%);
  width: 3.5rem;
  height: 1px;
  background: var(--accent);
}

.title-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.95rem;
  color: var(--ink-dim);
  letter-spacing: 0.18em;
}

.title-desc {
  max-width: 30ch;
  line-height: 2.3;
  font-size: 0.95rem;
  color: var(--ink-dim);
  letter-spacing: 0.05em;
  margin-top: 1rem;
}

.btn-primary {
  font-family: 'Shippori Mincho', serif;
  background: transparent;
  border: 1px solid var(--accent-deep);
  color: var(--accent);
  padding: 1.1rem 3rem;
  font-size: 0.95rem;
  letter-spacing: 0.4em;
  cursor: pointer;
  transition: all 0.5s cubic-bezier(.2,.7,.3,1);
  margin-top: 1.5rem;
  position: relative;
  padding-right: calc(3rem - 0.4em);
}

.btn-primary:hover {
  background: var(--accent);
  color: var(--bg);
  letter-spacing: 0.5em;
  padding-right: calc(3rem - 0.5em);
}

.btn-subtle {
  font-family: 'Shippori Mincho', serif;
  background: transparent;
  border: none;
  color: var(--ink-faint);
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  cursor: pointer;
  transition: color 0.3s ease;
  padding: 0.5rem 1rem;
}

.btn-subtle:hover { color: var(--ink-dim); }

.title-footer {
  margin-top: 2rem;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.8rem;
  color: var(--ink-faint);
  letter-spacing: 0.1em;
}

/* ====== LOADING / TRANSITION ====== */
.loading {
  min-height: 70vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.loading-text {
  font-family: 'Shippori Mincho', serif;
  color: var(--ink-dim);
  letter-spacing: 0.3em;
  font-size: 1rem;
  animation: breathePulse 2.4s ease infinite;
}

@keyframes breathePulse {
  0%, 100% { opacity: 0.25; }
  50% { opacity: 0.85; }
}

@keyframes slowFade {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ====== SCENE ====== */
.scene {
  animation: sceneFade 1.4s ease forwards;
}

@keyframes sceneFade {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.life-header {
  text-align: center;
  margin-bottom: 3.5rem;
  padding-bottom: 2rem;
  position: relative;
}

.life-header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 2rem;
  height: 1px;
  background: var(--accent-deep);
}

.life-name {
  font-size: clamp(1.6rem, 4vw, 2rem);
  letter-spacing: 0.25em;
  margin-bottom: 0.8rem;
  font-weight: 500;
  padding-right: 0.25em;
}

.life-meta {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--ink-dim);
  font-size: 0.85rem;
  letter-spacing: 0.12em;
}

.prose {
  font-size: 1.02rem;
  line-height: 2.3;
  letter-spacing: 0.05em;
  margin-bottom: 3rem;
  color: var(--ink);
}

.prose p {
  margin-bottom: 1.2rem;
  text-indent: 1em;
  opacity: 0;
  animation: revealText 1.1s ease forwards;
}

.prose p:nth-child(1) { animation-delay: 0.3s; }
.prose p:nth-child(2) { animation-delay: 1.0s; }
.prose p:nth-child(3) { animation-delay: 1.7s; }
.prose p:nth-child(4) { animation-delay: 2.4s; }

@keyframes revealText {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.choice-prompt {
  font-style: italic;
  color: var(--ink-dim);
  text-align: center;
  margin: 2rem 0 1.5rem;
  font-size: 0.92rem;
  letter-spacing: 0.1em;
  font-family: 'Cormorant Garamond', serif;
  opacity: 0;
  animation: revealText 1s ease 1.6s forwards;
}

.choices {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
  opacity: 0;
  animation: revealText 1s ease 2.0s forwards;
}

.choice {
  font-family: 'Shippori Mincho', serif;
  background: transparent;
  border: 1px solid rgba(201, 169, 97, 0.18);
  color: var(--ink);
  padding: 1.2rem 1.8rem;
  font-size: 0.98rem;
  letter-spacing: 0.05em;
  cursor: pointer;
  text-align: left;
  transition: all 0.35s cubic-bezier(.2,.7,.3,1);
  line-height: 1.8;
  position: relative;
  font-weight: 400;
}

.choice::before {
  content: '─';
  margin-right: 1rem;
  color: var(--accent-deep);
  transition: color 0.3s ease, margin-right 0.3s ease;
}

.choice:hover {
  border-color: var(--accent);
  background: rgba(201, 169, 97, 0.04);
}

.choice:hover::before {
  color: var(--accent);
  margin-right: 1.4rem;
}

.scene-progress {
  position: fixed;
  top: 1.5rem;
  right: 1.8rem;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--ink-faint);
  font-size: 0.8rem;
  letter-spacing: 0.15em;
  z-index: 100;
}

/* ====== ENDING ====== */
.ending .prose { text-indent: 0; }
.ending .prose p { text-indent: 0; }

.epitaph {
  border: 1px solid var(--accent-deep);
  padding: 3rem 2.5rem;
  margin: 4rem 0 2rem;
  position: relative;
  background: rgba(201, 169, 97, 0.025);
  opacity: 0;
  animation: revealText 1.4s ease 3.5s forwards;
}

.epitaph::before, .epitaph::after {
  content: '';
  position: absolute;
  width: 10px;
  height: 10px;
  border: 1px solid var(--accent);
}

.epitaph::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
.epitaph::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

.epitaph-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--accent);
  font-size: 0.78rem;
  letter-spacing: 0.35em;
  text-align: center;
  margin-bottom: 1.5rem;
  padding-right: 0.35em;
}

.epitaph-text {
  font-size: 1.1rem;
  line-height: 2.2;
  letter-spacing: 0.08em;
  text-align: center;
  color: var(--ink);
}

.seal {
  display: inline-block;
  color: var(--crimson);
  font-family: 'Shippori Mincho', serif;
  font-size: 0.7rem;
  border: 1.5px solid var(--crimson);
  padding: 0.3rem 0.45rem;
  letter-spacing: 0.05em;
  margin: 1.5rem auto 0;
  font-weight: 700;
  writing-mode: vertical-rl;
  display: block;
  width: fit-content;
  background: rgba(168, 65, 46, 0.05);
}

.actions {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-top: 3.5rem;
  flex-wrap: wrap;
  opacity: 0;
  animation: revealText 1s ease 4.2s forwards;
}

.tally {
  margin-top: 2rem;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.82rem;
  color: var(--ink-faint);
  letter-spacing: 0.12em;
  text-align: center;
  opacity: 0;
  animation: revealText 1s ease 4.5s forwards;
}

@media (max-width: 640px) {
  .app { padding: 2.5rem 1.5rem 4rem; }
  .scene-progress { top: 1rem; right: 1rem; font-size: 0.7rem; }
  .prose { font-size: 0.98rem; line-height: 2.1; }
  .epitaph { padding: 2rem 1.5rem; }
  .epitaph-text { font-size: 1rem; letter-spacing: 0.06em; }
  .choice { padding: 1.1rem 1.4rem; font-size: 0.93rem; }
  .title-mark { letter-spacing: 0.25em; padding-right: 0.25em; }
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ============================================================
// 八つの人生
// ============================================================
const LIVES = [
  {
    name: '桶職人',
    meta: 'a cooper, Edo, 1781',
    start: 'a',
    nodes: {
      a: { intro: true, next: 'a2',
        text: ['火の見櫓の鐘が四つを告げる頃，お前は薄暗い土間で目を覚ます．九つの夏．父の手は節くれだち，桧の匂いが体じゅうに染みついている．',
               '土間には削りかけの木が転がり，鉋屑が朝の光に薄く舞っている．父は何も言わず，ただ顎で「来い」と示した．'],
        cont: '父のそばへ行く' },

      a2: { intro: true, next: 'b_choice',
        text: ['父は一本の木を差し出した．「触ってみろ」とだけ言う．',
               'お前は恐る恐る木肌に手を這わせる．冷たく，硬く，けれどどこか，生きていた頃の温もりを残しているようにも思えた．',
               '「木は，死んでからのほうが長く生きる」と父は呟いた．意味は，まだ分からなかった．'],
        cont: '鉋を受け取る' },

      b_choice: {
        text: ['父が初めて，お前に鉋を握ることを許した日のこと．目の前には二本の木．',
               '一本はまっすぐな良材．もう一本は節があり，わずかに曲がっている．「どちらでもよい．好きなほうを削れ」と父は言った．'],
        prompt: 'お前は，',
        choices: [
          { text: 'まっすぐな木目に，言われた通り鉋を当てる．', to: 'b_sei' },
          { text: '節のある曲がった木が気になり，そちらを手に取る．', to: 'b_kyoku' }
        ]},

      // ───── 進路1：正道 ─────
      b_sei: { intro: true, next: 'b_sei2',
        text: ['まっすぐな木は素直だった．鉋は滑らかに走り，薄い屑が長く長く伸びていく．',
               '父は黙って頷いた．それが，父の最大の賛辞だと，後になって知る．'],
        cont: '年月が流れる' },
      b_sei2: {
        text: ['年月が過ぎ，お前の桶は「水を一滴も漏らさぬ」と評判になった．問屋が列をなす．父はもう鉋を握れぬ身となり，土間の隅で日がな一日，お前の手元を見ている．',
               'ある日，注文がふたつ重なった．豪商の祝言の桶と，貧しい寡婦の風呂桶．納期は同じ．手は二本しかない．'],
        prompt: 'お前はまず，',
        choices: [
          { text: '豪商の桶から仕上げる．銭が暖簾を守る．', to: 'c_shoten' },
          { text: '寡婦の桶を先に．冬が迫っているゆえ．', to: 'c_kafu' }
        ]},

      // ───── 進路2：曲がった木 ─────
      b_kyoku: { intro: true, next: 'b_kyoku2',
        text: ['曲がった木は手強かった．鉋は跳ね，屑は途切れ，何度も刃が食い込んで止まる．',
               '父は止めなかった．ただ一度だけ，「木の言うことを聞け．お前の言うことを，木に聞かせるな」と言った．'],
        cont: '父を看取る' },
      b_kyoku2: {
        text: ['曲がった木を活かす桶は手間がかかり，銭にならぬ．父は何も遺さず逝った．最期の夜，「お前は，遠回りをする男だ」と，どこか嬉しそうに言って．',
               'ある日，お前の歪な桶を見た数寄者が「これは茶席の趣がある」と買い求めた．名が，少しだけ売れた．'],
        prompt: 'お前は，',
        choices: [
          { text: '数寄者の好みに合わせ，「見せる桶」を作りはじめる．', to: 'c_miseru' },
          { text: '評判には乗らず，これまで通り市井の桶を作りつづける．', to: 'c_shisei' }
        ]},

      // ───── 第三幕：弟子（進路ごとに分かれる） ─────
      c_shoten: { intro: true, next: 'deshi_shoten',
        text: ['暖簾は栄えた．だが豪商に媚びた仕事だと陰口も聞こえる．寡婦の桶は，間に合わなかった．その冬，寡婦は風邪をこじらせたと，後で人づてに聞いた．',
               'お前は何も言わず，ただ次の桶を削った．削るほかに，どうすればよいか分からなかった．'],
        cont: '歳月が過ぎる' },
      c_kafu: { intro: true, next: 'deshi_kafu',
        text: ['豪商は怒り，注文を引き上げた．暮らしは細った．だが寡婦は毎年，米を一握り届けてくる．「あの桶のおかげで，冬を越せました」と，何度も頭を下げて．',
               '銭は減った．けれど土間の桧の匂いは，前より澄んで感じられた．'],
        cont: '歳月が過ぎる' },
      c_miseru: { intro: true, next: 'deshi_miseru',
        text: ['「見せる桶」は高値で売れ，お前の名は江戸に知れた．床の間を飾る桶，茶席に置かれる桶．水を入れぬ桶ばかりが増えていく．',
               'ある夜，ふと自分の手を見た．節くれだった，父と同じ手．だがこの手は，もう何を作っているのだったか．'],
        cont: '歳月が過ぎる' },
      c_shisei: { intro: true, next: 'deshi_shisei',
        text: ['名は廃れたが，長屋の者はみなお前の桶を使った．曲がった木の桶は，不思議と手に馴染むと言う．銭は乏しいが，使う者の顔が見える暮らしだった．',
               '父の言葉を，ようやく少し分かりかけていた．木の言うことを，聞く．それだけのことが，一生かかっても難しい．'],
        cont: '歳月が過ぎる' },

      // ── 弟子の問いは共通だが，選択肢はそれまでの進路に沿う ──
      deshi_shoten: { intro: true, next: 'dq_shoten',
        text: ['五十を越えた頃，不器用な弟子がひとり来た．手つきは拙いが，目だけは澄んでいる．九つの夏のお前を見るようだった．',
               '弟子は毎朝，誰より早く土間に来て鉋を研ぎ，お前の手元を食い入るように見ていた．'],
        cont: '弟子と向き合う' },
      dq_shoten: {
        text: ['ある夜，弟子が手を止めて囁いた．「親方，銭のために桶を作るのは，正しいことなので」と．',
               '声が震えていた．豪商に頭を下げつづけたお前の背中を，弟子はずっと見ていたのだ．'],
        prompt: 'お前は応える．',
        choices: [
          { text: '「銭を稼げぬ職人は，弟子も家族も守れぬ」', to: 'pre_jitsu' },
          { text: '「……分からぬ．だが，迷うても木は削れる」', to: 'pre_michi' }
        ]},

      deshi_kafu: { intro: true, next: 'dq_kafu',
        text: ['五十を越えた頃，不器用な弟子がひとり来た．手つきは拙いが，目だけは澄んでいる．九つの夏のお前を見るようだった．',
               '弟子は，お前が銭にならぬ桶ばかり作るのを，不思議そうに見ていた．'],
        cont: '弟子と向き合う' },
      dq_kafu: {
        text: ['ある夜，弟子が手を止めて囁いた．「親方，こんなに損ばかりして，悔いはないので」と．',
               '声が震えていた．米を届けに来る寡婦の姿を，弟子も幾度か見ていた．'],
        prompt: 'お前は応える．',
        choices: [
          { text: '「桶は，凍える者のためにある．それで足る」', to: 'pre_jou' },
          { text: '「損も得も，木は知らぬ．俺も，まだ知らぬ」', to: 'pre_michi' }
        ]},

      deshi_miseru: { intro: true, next: 'dq_miseru',
        text: ['五十を越えた頃，不器用な弟子がひとり来た．手つきは拙いが，目だけは澄んでいる．九つの夏のお前を見るようだった．',
               '弟子は，床の間に飾られたお前の桶を，ためつすがめつ眺めていた．'],
        cont: '弟子と向き合う' },
      dq_miseru: {
        text: ['ある夜，弟子が手を止めて囁いた．「親方，この桶は，何のために作るので」と．',
               '声が震えていた．水を入れられぬ桶ばかりを，弟子は怪訝に思っていたのだ．'],
        prompt: 'お前は応える．',
        choices: [
          { text: '「人の目を喜ばせる．それも，一つの道だ」', to: 'pre_na' },
          { text: '——答えに詰まる．その夜，久々に水を入れる桶を削った．', to: 'pre_michi' }
        ]},

      deshi_shisei: { intro: true, next: 'dq_shisei',
        text: ['五十を越えた頃，不器用な弟子がひとり来た．手つきは拙いが，目だけは澄んでいる．九つの夏のお前を見るようだった．',
               '弟子は毎朝，誰より早く土間に来て，お前の鉋を研いだ．'],
        cont: '弟子と向き合う' },
      dq_shisei: {
        text: ['ある夜，弟子が手を止めて囁いた．「親方，もっと上を，名を目指さぬので」と．',
               '声が震えていた．お前の桶が市井で愛されてなお，名は廃れたままなのを，弟子は歯がゆく思っていた．'],
        prompt: 'お前は応える．',
        choices: [
          { text: '「上などない．水が漏れねば，それで足る」', to: 'pre_jitsu' },
          { text: '「曲がった木にも，使い道がある．それだけだ」', to: 'pre_jou' }
        ]},

      // ───── 終幕前の幕間（進路で文言が変わる） ─────

// ============================================================
// 状態と進行
// ============================================================
let state = {
  currentLife: null,
  nodeId: null,
  step: 0,        // 選択を何回終えたか（進捗表示用）
  totalSteps: 0,  // この人生の選択回数の見込み
  history: [],
  livedCount: 0,
  lastLifeIdx: -1
};

const app = document.getElementById('app');

function pickLife() {
  let idx;
  if (LIVES.length === 1) idx = 0;
  else {
    do { idx = Math.floor(Math.random() * LIVES.length); }
    while (idx === state.lastLifeIdx);
  }
  state.lastLifeIdx = idx;
  state.currentLife = LIVES[idx];
  state.history = [];
  state.step = 0;
  state.nodeId = state.currentLife.start;
  state.totalSteps = estimateDepth(state.currentLife);
}

// 最短経路上の「選択ノード」の数を進捗分母にする
function estimateDepth(life) {
  let count = 0, id = life.start, guard = 0;
  while (id && guard++ < 40) {
    const node = life.nodes[id];
    if (node.ending) break;
    if (node.choices) count++;          // 選択を要するノードだけ数える
    id = node.choices ? node.choices[0].to : node.next;
  }
  return Math.max(count, 1);
}

// ============================================================
// レンダリング
// ============================================================
function renderTitle() {
  app.innerHTML = `
    <div class="title-screen">
      <div>
        <div class="title-mark">人生拝借</div>
        <div class="title-sub" style="margin-top:1.8rem">a life borrowed for five minutes</div>
      </div>
      <div class="title-desc">
        八つの人生のうち，ひとつが，あなたに貸し出されます．<br>
        幾度かの選択が，物語を分かち，墓碑銘をひとつ残す．
      </div>
      <button class="btn-primary" onclick="startLife()">は じ め る</button>
      <div class="title-footer">— please choose nothing in haste —</div>
    </div>
  `;
}

function renderLoading(messages) {
  let i = 0;
  app.innerHTML = `<div class="loading"><div class="loading-text" id="loadtxt">${messages[0]}</div></div>`;
  const txt = document.getElementById('loadtxt');
  const interval = setInterval(() => {
    i++;
    if (i >= messages.length) { clearInterval(interval); return; }
    txt.style.opacity = '0';
    setTimeout(() => {
      txt.textContent = messages[i];
      txt.style.opacity = '';
    }, 400);
  }, 1400);
}

function startLife() {
  pickLife();
  renderLoading([
    '人生が，ひとつ，選ばれる ………',
    '風が，少しだけ，吹いてくる ………',
    '幕が，上がる ………'
  ]);
  setTimeout(renderCurrentScene, 4600);
}

function renderCurrentScene() {
  renderNode();
}

// ---------- ノードベース ----------
function renderNode() {
  const life = state.currentLife;
  const node = life.nodes[state.nodeId];
  const isFirst = state.nodeId === life.start;

  if (node.ending) { renderEndingNode(node); return; }

  const header = isFirst ? `
    <div class="life-header">
      <div class="life-name">${life.name}</div>
      <div class="life-meta">${life.meta}</div>
    </div>` : '';

  if (isFirst) state.step = 0;
  if (node.choices) state.step++;
  const shown = node.choices ? state.step : Math.min(state.step + 1, state.totalSteps);
  const progress = `<div class="scene-progress">${Math.min(shown, state.totalSteps)} / ${state.totalSteps}</div>`;

  let choicesHtml;
  if (!node.choices && node.next) {
    // 読み物シーン（intro / interlude）：選択肢なし
    choicesHtml = `<button class="choice" onclick="advanceNode('${node.next}')">${node.cont || '続ける'}</button>`;
  } else {
    choicesHtml = node.choices.map((c, i) =>
      `<button class="choice" onclick="chooseNode(${i})">${c.text}</button>`
    ).join('');
  }

  const promptHtml = node.prompt ? `<div class="choice-prompt">${node.prompt}</div>` : '';

  app.innerHTML = `${progress}<div class="scene">${header}
    <div class="prose">${node.text.map(t => `<p>${t}</p>`).join('')}</div>
    ${promptHtml}
    <div class="choices">${choicesHtml}</div>
  </div>`;
}

function chooseNode(idx) {
  const node = state.currentLife.nodes[state.nodeId];
  const choice = node.choices[idx];
  state.history.push({ node: state.nodeId, choice: idx });
  state.nodeId = choice.to;
  renderNode();
}

function advanceNode(nextId) {
  state.nodeId = nextId;
  renderNode();
}

function renderEndingNode(node) {
  state.livedCount++;
  const life = state.currentLife;
  app.innerHTML = `
    <div class="scene ending">
      <div class="life-header">
        <div class="life-name">${life.name}</div>
        <div class="life-meta">${life.meta}</div>
      </div>
      <div class="prose">${node.text.map(t => `<p>${t}</p>`).join('')}</div>
      <div class="epitaph">
        <div class="epitaph-label">EPITAPH</div>
        <div class="epitaph-text">${node.epitaph}</div>
        <div class="seal">拝借</div>
      </div>
      <div class="actions">
        <button class="btn-primary" onclick="startLife()">別 の 人 生 を</button>
        <button class="btn-subtle" onclick="renderTitle()">表 紙 へ</button>
      </div>
      <div class="tally">— this session: ${state.livedCount} ${state.livedCount === 1 ? 'life' : 'lives'} borrowed —</div>
    </div>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}


// 起動
renderTitle();
</script>
